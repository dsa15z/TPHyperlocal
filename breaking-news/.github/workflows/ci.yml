name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, worker, mcp-server]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: breaking-news/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: breaking-news/${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: breaking-news/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Typecheck
        working-directory: breaking-news/${{ matrix.service }}
        run: npx tsc --noEmit --pretty

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        service: [frontend, backend, worker, mcp-server]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: breaking-news/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: breaking-news/${{ matrix.service }}
        run: npm ci

      - name: Build
        working-directory: breaking-news/${{ matrix.service }}
        run: npm run build
